  <rect x="370" y="344" width="120" height="38" rx="19" fill="#174d33"/><text x="430" y="369" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#fffaf0" font-weight="700">18 Market Lane</text>
